services:
  annotation:
    shm_size: "8gb"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_INDEX: https://download.pytorch.org/whl/cu121
    image: data-annotation-sw:gpu
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "7860:7860"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ANNOTATION_WEB_HOST=0.0.0.0
      - ANNOTATION_WEB_PORT=7860
    gpus: all
    command: ["python", "-m", "uvicorn", "pipeline.gui_app:app", "--host", "0.0.0.0", "--port", "7860"]